<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit','Segoe UI',sans-serif;background:#09090f;color:#e2e8f0;min-height:100vh;display:flex}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#1e2433;border-radius:2px}
input,textarea,select{outline:none;font-family:inherit}
button{cursor:pointer;font-family:inherit}
#sidebar{width:220px;background:#0b0b14;border-right:1px solid #1a1f2e;padding:20px 12px;display:flex;flex-direction:column;gap:3px;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto;z-index:50}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#content{flex:1;overflow:auto;padding:28px 32px}
.nav-logo{padding:4px 10px 18px;border-bottom:1px solid #1a1f2e;margin-bottom:8px}
.nav-logo .t{font-size:17px;font-weight:800;color:#f59e0b;letter-spacing:-.03em}
.nav-logo .s{font-size:10px;color:#475569;margin-top:2px}
.ni{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:10px;color:#64748b;font-size:14px;font-weight:500;border:none;background:none;width:100%;text-align:left;cursor:pointer;transition:all .15s}
.ni:hover{background:#13151f;color:#cbd5e1}
.ni.act{background:#151720;color:#f59e0b}
.ni-icon{font-size:18px;width:22px;text-align:center;flex-shrink:0}
.nb{background:#1a1f2e;color:#64748b;font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;margin-left:auto}
.nav-sep{height:1px;background:#1a1f2e;margin:8px 4px}
.nav-bot{padding:12px 10px;border-top:1px solid #1a1f2e;margin-top:auto;font-size:11px;color:#475569}
.btn{padding:9px 18px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:7px}
.bp{background:#f59e0b;color:#09090f}.bp:hover{background:#d97706}
.bg{background:#13151f;color:#94a3b8;border:1px solid #1a1f2e}.bg:hover{background:#1a1f2e;color:#e2e8f0}
.bd{background:#2d0a0a;color:#f87171;border:1px solid #3f1515}.bd:hover{background:#3f1515}
.bs{background:#062016;color:#34d399;border:1px solid #0d3a25}.bs:hover{background:#0d3a25}
.btn-sm{padding:5px 11px;font-size:12px}
.inp{background:#13151f;border:1px solid #1a1f2e;border-radius:10px;color:#e2e8f0;padding:10px 14px;font-size:13px;width:100%;transition:border .15s}
.inp:focus{border-color:#f59e0b55}
select.inp option{background:#13151f}
.card{background:#0f1118;border:1px solid #1a1f2e;border-radius:14px;padding:20px}
.sc{background:#0f1118;border:1px solid #1a1f2e;border-radius:13px;padding:18px 20px;cursor:pointer;transition:border-color .2s}
.sc:hover{border-color:#f59e0b44}
.lbl{font-size:11px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;display:block}
.st{font-size:11px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;display:inline-block}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700}
.pb{height:3px;background:#1a1f2e;border-radius:2px;overflow:hidden;margin-top:6px}
.pf{height:100%;border-radius:2px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}
.mono{font-family:'JetBrains Mono',monospace}
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:10px 14px;font-size:12px;font-weight:700;color:#475569;text-transform:uppercase;border-bottom:1px solid #1a1f2e;cursor:pointer;user-select:none;white-space:nowrap}
.tbl th:hover{color:#94a3b8}
.tbl th .sa{font-size:10px;margin-left:4px;opacity:.5}
.tbl td{padding:12px 14px;border-bottom:1px solid #1a1f2e22;font-size:13px}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#13151f55}
.stag{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700;background:#13151f;color:#94a3b8}
.search-bar{position:relative;max-width:320px}
.search-bar input{padding-left:36px;background:#0b0b14;border:1px solid #1a1f2e}
.search-bar::before{content:'⌕';position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#475569;font-size:16px;pointer-events:none}
#timer-bar{position:sticky;top:0;z-index:100;background:#09090fee;backdrop-filter:blur(10px);border-bottom:1px solid #1a1f2e;padding:10px 28px;display:none;align-items:center;gap:14px}
#modal-ov{display:none;position:fixed;inset:0;background:#00000099;backdrop-filter:blur(6px);z-index:200;align-items:center;justify-content:center}
#modal-ov.open{display:flex}
.mbox{background:#0f1118;border:1px solid #1a1f2e;border-radius:18px;padding:28px;width:540px;max-width:95vw;max-height:90vh;overflow-y:auto}
.mfooter{display:flex;gap:9px;justify-content:flex-end;margin-top:20px}
.fr{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.cp{display:flex;gap:7px;flex-wrap:wrap}
.cs{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border .15s}
.cs.sel{border-color:#fff}
#confirm-ov{display:none;position:fixed;inset:0;background:#000000bb;backdrop-filter:blur(8px);z-index:300;align-items:center;justify-content:center}
#confirm-ov.open{display:flex}
.cbox{background:#0f1118;border:1px solid #1a1f2e;border-radius:16px;padding:28px;width:380px;max-width:92vw;text-align:center}
.cbox h3{font-size:16px;font-weight:700;margin-bottom:10px}
.cbox p{font-size:14px;color:#94a3b8;margin-bottom:22px;line-height:1.5}
#toasts{position:fixed;top:20px;right:20px;z-index:400;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;transform:translateX(120%);transition:transform .3s cubic-bezier(.4,0,.2,1);pointer-events:auto;max-width:340px}
.toast.show{transform:translateX(0)}
.toast-success{background:#062016;color:#34d399;border:1px solid #0d3a25}
.toast-error{background:#2d0a0a;color:#f87171;border:1px solid #3f1515}
.toast-info{background:#0c1a3d;color:#60a5fa;border:1px solid #1e3a5f}
#err-bar{display:none;background:#2d0a0a;border-bottom:1px solid #3f1515;padding:10px 28px;font-size:13px;color:#f87171;align-items:center;gap:10px}
#sync{display:none;position:fixed;bottom:20px;right:20px;background:#13151f;border:1px solid #f59e0b44;color:#f59e0b;padding:8px 16px;border-radius:9px;font-size:12px;font-weight:600;z-index:300}
#setup{display:none;align-items:center;justify-content:center;min-height:100vh;padding:24px;flex:1}
.sbox{background:#0f1118;border:1px solid #1a1f2e;border-radius:20px;padding:40px;max-width:460px;width:100%}
.cbar{display:flex;align-items:flex-end;gap:6px;height:150px;padding-bottom:22px;position:relative}
.bcol{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end}
.binn{width:100%;background:#1a1f2e;border-radius:3px 3px 0 0;position:relative;min-height:2px}
.bfil{position:absolute;bottom:0;left:0;right:0;background:#f59e0b;border-radius:3px 3px 0 0}
.blab{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:10px;color:#475569;white-space:nowrap}
#hamburger{display:none;position:fixed;top:14px;left:14px;z-index:60;background:#13151f;border:1px solid #1a1f2e;color:#e2e8f0;font-size:22px;width:42px;height:42px;border-radius:10px;align-items:center;justify-content:center;cursor:pointer}
#sidebar-ov{display:none;position:fixed;inset:0;background:#00000088;z-index:40}
@media(max-width:768px){
  #sidebar{position:fixed;left:-260px;top:0;width:250px;transition:left .25s;z-index:50;height:100vh}
  #sidebar.open{left:0}
  #sidebar-ov.open{display:block}
  #hamburger{display:flex}
  #content{padding:18px 16px;padding-top:60px}
  .g4{grid-template-columns:repeat(2,1fr)}
  .g2{grid-template-columns:1fr}
  .g3{grid-template-columns:1fr}
  .mbox{padding:20px;width:95vw}
  #timer-bar{padding:10px 16px;padding-left:60px}
  .search-bar{max-width:100%}
}
.tl{display:flex;align-items:flex-start;gap:0;margin:16px 0;overflow-x:auto;padding-bottom:4px}
.tl-step{flex:1;min-width:90px;display:flex;flex-direction:column;align-items:center;position:relative}
.tl-dot{width:14px;height:14px;border-radius:50%;border:2px solid #1a1f2e;background:#09090f;z-index:2;transition:all .2s}
.tl-dot.done{background:#10b981;border-color:#10b981}
.tl-dot.active{background:#f59e0b;border-color:#f59e0b;box-shadow:0 0 8px #f59e0b88}
.tl-dot.future{background:#09090f;border-color:#1a1f2e}
.tl-line{position:absolute;top:6px;left:50%;width:100%;height:2px;background:#1a1f2e;z-index:1}
.tl-line.done{background:#10b981}
.tl-label{font-size:10px;font-weight:700;color:#475569;margin-top:8px;text-align:center;text-transform:uppercase;letter-spacing:.04em}
.tl-label.done{color:#10b981}.tl-label.active{color:#f59e0b}
.tl-date{font-size:10px;color:#64748b;margin-top:2px;font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>
<div id="toasts"></div>
<div id="confirm-ov" onclick="if(event.target===this)closeConfirm()">
  <div class="cbox"><h3 id="cf-title">Potvrdit akci</h3><p id="cf-msg"></p>
  <div style="display:flex;gap:10px;justify-content:center"><button class="btn bg" onclick="closeConfirm()">Zrušit</button><button class="btn bd" id="cf-yes">Smazat</button></div></div>
</div>
<div id="setup"><div class="sbox">
  <div style="font-size:32px;margin-bottom:10px">📋</div>
  <h1 style="font-size:22px;font-weight:800;margin-bottom:6px">Management System</h1>
  <p style="color:#64748b;font-size:14px;margin-bottom:24px">Vlož URL svého Google Apps Script.</p>
  <label class="lbl">Apps Script URL</label>
  <input class="inp" id="setup-url" placeholder="https://script.google.com/macros/s/..."/>
  <button class="btn bp" style="width:100%;justify-content:center;margin-top:14px" onclick="saveUrl()">Připojit →</button>
</div></div>
<div id="app" style="display:none;flex:1">
  <div id="sidebar-ov" onclick="closeSidebar()"></div>
  <button id="hamburger" onclick="toggleSidebar()">☰</button>
  <div id="sidebar">
    <div class="nav-logo"><div class="t">Management</div><div class="s">System v2</div></div>
    <button class="ni act" data-v="dashboard" onclick="nav(this)"><span class="ni-icon">⊞</span>Přehled</button>
    <button class="ni" data-v="clients" onclick="nav(this)"><span class="ni-icon">◉</span>Klienti<span class="nb" id="bc">0</span></button>
    <button class="ni" data-v="orders" onclick="nav(this)"><span class="ni-icon">◈</span>Zakázky<span class="nb" id="bo">0</span></button>
    <button class="ni" data-v="archive" onclick="nav(this)"><span class="ni-icon">⊡</span>Archiv<span class="nb" id="ba">0</span></button>
    <button class="ni" data-v="time" onclick="nav(this)"><span class="ni-icon">◷</span>Čas</button>
    <button class="ni" data-v="invoices" onclick="nav(this)"><span class="ni-icon">◻</span>Faktury<span class="nb" id="bi">0</span></button>
    <button class="ni" data-v="reports" onclick="nav(this)"><span class="ni-icon">◑</span>Reporty</button>
    <div class="nav-sep"></div>
    <button class="ni" data-v="settings" onclick="nav(this)"><span class="ni-icon">⚙</span>Nastavení</button>
    <div class="nav-bot"><div>Celkový obrat</div><div class="mono" id="nav-rev" style="color:#f59e0b;font-weight:800;font-size:14px">0 Kč</div></div>
  </div>
  <div id="main">
    <div id="err-bar"><span id="err-msg"></span><button class="btn bg btn-sm" style="margin-left:auto" onclick="loadAll()">Zkusit znovu</button></div>
    <div id="timer-bar">
      <span class="dot" id="td" style="width:12px;height:12px"></span>
      <div style="flex:1"><div style="font-size:12px;color:#64748b" id="ton"></div>
      <input class="inp" id="tdesc" placeholder="Popis práce..." style="padding:3px 9px;font-size:12px;width:220px;margin-top:2px;background:#13151f"></div>
      <div class="mono" id="tdisp" style="font-size:28px;font-weight:600;color:#f59e0b">00:00:00</div>
      <button class="btn bd" onclick="stopTimer()">⏹ Uložit</button>
    </div>
    <div id="content"></div>
  </div>
</div>
<div id="modal-ov" onclick="if(event.target===this)closeModal()"><div class="mbox" id="mbox"></div></div>
<div id="sync">⟳ Ukládám…</div>
<script>
const DB={clients:[],orders:[],entries:[],invoices:[],expenses:[],notes:[]};
let curView='dashboard';let TS={running:false,orderId:null,elapsed:0,iv:null};
let FC='#f59e0b';let INV_ITEMS=[];let SEARCH='';let confirmCb=null;
const COLORS=['#f59e0b','#3b82f6','#10b981','#ef4444','#8b5cf6','#ec4899','#06b6d4','#f97316'];
const STAGES=['Poptávka','Nabídka','Projekce','Realizace','Předání','Fakturováno','Zaplaceno'];
const EXP_CATS=['Materiál','Práce','Subdodávka','Doprava','Nářadí','Režie','Ostatní'];

const $=id=>document.getElementById(id);
const fmtM=(n,c)=>new Intl.NumberFormat('cs-CZ',{style:'currency',currency:c||'CZK',minimumFractionDigits:0}).format(n||0);
const fmtD=d=>d?new Date(d).toLocaleDateString('cs-CZ'):'—';
const fmtDur=s=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h===0?m+' min':m===0?h+' hod':h+'h '+m+'m';};
const fmtT=s=>String(Math.floor(s/3600)).padStart(2,'0')+':'+String(Math.floor((s%3600)/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
const today=()=>new Date().toISOString().slice(0,10);
const e=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const ts=oid=>DB.entries.filter(x=>x.orderId===oid).reduce((s,x)=>s+(x.duration||0),0);
const gc=id=>DB.clients.find(c=>c.id===Number(id));
const go=id=>DB.orders.find(o=>o.id===Number(id));
const expSum=oid=>DB.expenses.filter(x=>x.orderId===oid).reduce((s,x)=>s+(x.amount||0),0);
const nin=()=>{const y=new Date().getFullYear();const n=DB.invoices.filter(i=>(i.number||'').includes(String(y))).length+1;return 'FV-'+y+'-'+String(n).padStart(3,'0');};
const prof=()=>{try{return JSON.parse(localStorage.getItem('mgmt_profile')||'{}');}catch{return{};}};
function sFilter(items,q,fields){if(!q)return items;const s=q.toLowerCase();return items.filter(it=>fields.some(f=>{const v=typeof f==='function'?f(it):it[f];return String(v||'').toLowerCase().includes(s);}));}
function searchBox(ph){return '<div class="search-bar"><input class="inp" placeholder="'+ph+'" value="'+e(SEARCH)+'" oninput="SEARCH=this.value;render()"></div>';}

function getUrl(){return localStorage.getItem('mgmt_url')||'https://script.google.com/macros/s/AKfycbynSxfYv2tY9DCC71DsWJ_vIbAJgzGPMtnmzJQYpUVMY1UJl3nn3EVlZdJW25vCQXaPIA/exec';}
function autoColor(){var cid=Number($('fcl')?.value);var c=gc(cid);if(c&&c.color){FC=c.color;document.querySelectorAll('.cs').forEach(function(x){x.classList.toggle('sel',x.style.background===c.color||x.style.backgroundColor===c.color);});}}
function dueIn(days){var d=new Date();d.setDate(d.getDate()+days);return d.toISOString().slice(0,10);}
function saveUrl(){var u=$('setup-url').value.trim();if(!u)return;localStorage.setItem('mgmt_url',u);boot();}
window.onload=function(){if(!getUrl()){$('setup').style.display='flex';}else boot();};
function boot(){$('setup').style.display='none';$('app').style.display='flex';loadAll();}

async function apiFetch(p){var r=await fetch(getUrl()+'?'+new URLSearchParams(p));var j=await r.json();if(j.error)throw new Error(j.error);return j;}
async function apiPost(b){var r=await fetch(getUrl(),{method:'POST',body:JSON.stringify(b)});var j=await r.json();if(j.error)throw new Error(j.error);return j;}

async function loadAll(){
  html('<div style="text-align:center;padding:80px;color:#475569">⟳ Načítám data…</div>');
  try{var d=await apiFetch({action:'getAll'});
    DB.clients=d.clients||[];DB.orders=d.orders||[];DB.entries=d.entries||[];DB.invoices=d.invoices||[];DB.expenses=d.expenses||[];DB.notes=d.notes||[];
    hideErr();badges();render();
  }catch(err){showErr(err.message);html('<div style="text-align:center;padding:80px;color:#475569">Chyba načítání.<br><small>'+e(err.message)+'</small></div>');}
}

async function mut(action,sheet,payload){
  $('sync').style.display='block';
  try{var res=await apiPost({action:action,sheet:sheet,...payload});var d=res.data;
    if(action==='create')DB[sheet].push(d);
    if(action==='update'){var i=DB[sheet].findIndex(r=>r.id===d.id);if(i>-1)DB[sheet][i]=d;}
    if(action==='delete')DB[sheet]=DB[sheet].filter(r=>r.id!==d.id);
    badges();render();return d;
  }catch(err){showErr(err.message);toast(err.message,'error');}
  finally{$('sync').style.display='none';}
}

function toast(msg,type){
  type=type||'info';var t=document.createElement('div');t.className='toast toast-'+type;t.textContent=msg;
  $('toasts').appendChild(t);setTimeout(function(){t.classList.add('show');},10);
  setTimeout(function(){t.classList.remove('show');setTimeout(function(){t.remove();},300);},3000);
}
function confirmAction(msg,label,cb){
  $('cf-msg').textContent=msg;$('cf-yes').textContent=label||'Smazat';
  $('cf-yes').onclick=function(){closeConfirm();if(cb)cb();};
  $('confirm-ov').classList.add('open');
}
function closeConfirm(){$('confirm-ov').classList.remove('open');}

function nav(el){document.querySelectorAll('.ni').forEach(function(n){n.classList.remove('act');});el.classList.add('act');curView=el.dataset.v;SEARCH='';render();closeSidebar();}
function sv(v){document.querySelectorAll('.ni').forEach(function(n){n.classList.toggle('act',n.dataset.v===v);});curView=v;SEARCH='';render();}
function render(){
  var map={dashboard:vDash,clients:vClients,orders:vOrders,archive:vArchive,time:vTime,invoices:vInvoices,reports:vReports,settings:vSettings};
  if(map[curView])map[curView]();
  $('nav-rev').textContent=fmtM(DB.orders.reduce(function(s,o){return s+(o.price||0);},0));
}
function html(h){$('content').innerHTML=h;}
function badges(){
  $('bc').textContent=DB.clients.length;
  $('bo').textContent=DB.orders.filter(function(o){return o.status==='active';}).length;
  $('ba').textContent=DB.orders.filter(function(o){return o.status==='archived';}).length;
  $('bi').textContent=DB.invoices.length;
}
function showErr(m){$('err-bar').style.display='flex';$('err-msg').textContent=m;}
function hideErr(){$('err-bar').style.display='none';}
function toggleSidebar(){$('sidebar').classList.toggle('open');$('sidebar-ov').classList.toggle('open');}
function closeSidebar(){$('sidebar').classList.remove('open');$('sidebar-ov').classList.remove('open');}

function startTimer(oid){
  if(TS.running)return;var o=go(oid);TS={running:true,orderId:oid,elapsed:0};
  TS.iv=setInterval(function(){TS.elapsed++;$('tdisp').textContent=fmtT(TS.elapsed);},1000);
  $('timer-bar').style.display='flex';$('td').style.background=o?.color||'#f59e0b';
  $('td').style.boxShadow='0 0 10px '+(o?.color||'#f59e0b')+'88';$('ton').textContent=o?.name||'';render();
}
async function stopTimer(){
  clearInterval(TS.iv);var oid=TS.orderId,elapsed=TS.elapsed;
  TS={running:false,orderId:null,elapsed:0,iv:null};$('timer-bar').style.display='none';
  if(elapsed>0){var desc=$('tdesc').value||'Práce';$('tdesc').value='';
    await mut('create','entries',{data:{orderId:oid,description:desc,duration:elapsed,date:today()}});toast('Čas uložen','success');
  }else render();
}

function exportCSV(data,cols,filename){
  var header=cols.map(function(c){return c.label;}).join(';');
  var rows=data.map(function(row){return cols.map(function(c){var v=typeof c.fn==='function'?c.fn(row):row[c.key];v=String(v!=null?v:'').replace(/"/g,'""');return '"'+v+'"';}).join(';');}).join('\n');
  var blob=new Blob(['\ufeff'+header+'\n'+rows],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();
}

function printInv(id){
  var inv=DB.invoices.find(function(i){return i.id===id;});var cl=gc(inv?.clientId);var p=prof();

function vOrderDetail(id){
  var o=go(id);if(!o)return;curView='orderDetail';
  var cl=gc(o.clientId);var isR=TS.running&&TS.orderId===o.id;
  var dl=Math.ceil((new Date(o.deadline)-new Date())/86400000);
  var tSec=ts(o.id);var ex=expSum(o.id);var profit=o.price-ex;
  var stColor=o.stage==='Zaplaceno'?'#34d399':o.stage==='Fakturováno'||o.stage==='Předání'?'#f59e0b':o.stage==='Realizace'?'#3b82f6':'#94a3b8';
  var oInvs=DB.invoices.filter(function(i){return i.orderId===o.id;});
  var hasPaidInv=oInvs.some(function(i){return i.status==='paid';});
  var paidInv=oInvs.find(function(i){return i.status==='paid';});
  var sentInv=oInvs.find(function(i){return i.status==='sent'||i.status==='paid';});
  // Timeline milestones
  var si=STAGES.indexOf(o.stage);
  var milestones=[
    {label:'Přijetí',date:o.created,idx:0},
    {label:'Deadline',date:o.deadline,idx:4},
    {label:'Předání',date:si>=4?'✓':'',idx:4},
    {label:'Fakturace',date:sentInv?sentInv.issued:(si>=5?'✓':''),idx:5},
    {label:'Zaplaceno',date:paidInv?(paidInv.paidDate||'✓'):(si>=6?'✓':''),idx:6}
  ];
  var tlH='<div class="card" style="margin-bottom:18px"><div class="st">Průběh zakázky</div><div class="tl">'+milestones.map(function(m,i){
    var done=(i<=1)?true:(i===2?si>=4:i===3?si>=5:si>=6);
    var isAct=!done&&((i===2&&si>=3&&si<4)||(i===3&&si>=4&&si<5)||(i===4&&si>=5&&si<6));
    if(i===0)done=true;if(i===1)done=new Date()>=new Date(o.deadline);

function vSettings(){
  var p=prof();
  html('<div style="margin-bottom:28px"><h1 style="font-size:28px;font-weight:800;letter-spacing:-.04em">Nastavení firmy</h1><p style="color:#475569;font-size:14px;margin-top:4px">Údaje se zobrazí na fakturách</p></div><div class="card" style="max-width:640px"><div class="fr"><label class="lbl">Název firmy / Jméno</label><input class="inp" id="pName" value="'+e(p.companyName||'')+'"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px"><div class="fr" style="margin:0"><label class="lbl">IČO</label><input class="inp" id="pIco" value="'+e(p.ico||'')+'"></div><div class="fr" style="margin:0"><label class="lbl">DIČ</label><input class="inp" id="pDic" value="'+e(p.dic||'')+'"></div></div><div class="fr"><label class="lbl">Adresa</label><input class="inp" id="pAddr" value="'+e(p.address||'')+'"></div><div style="display:grid;grid-template-columns:2fr 1fr;gap:10px;margin-bottom:13px"><div class="fr" style="margin:0"><label class="lbl">Město</label><input class="inp" id="pCity" value="'+e(p.city||'')+'"></div><div class="fr" style="margin:0"><label class="lbl">PSČ</label><input class="inp" id="pZip" value="'+e(p.zip||'')+'"></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px"><div class="fr" style="margin:0"><label class="lbl">Email</label><input class="inp" id="pEmail" value="'+e(p.email||'')+'"></div><div class="fr" style="margin:0"><label class="lbl">Telefon</label><input class="inp" id="pPhone" value="'+e(p.phone||'')+'"></div></div><div class="fr"><label class="lbl">Číslo účtu</label><input class="inp" id="pBank" value="'+e(p.bankAccount||'')+'" placeholder="123456789/0100"></div><div class="fr"><label class="lbl">IBAN (pro QR platbu)</label><input class="inp" id="pIban" value="'+e(p.iban||'')+'" placeholder="CZ65 0800 0000 0012 3456 7899"></div><div class="mfooter" style="margin-top:24px"><button class="btn bp" onclick="saveProfile()">💾 Uložit nastavení</button></div></div>');
}
function saveProfile(){var data={companyName:$('pName').value,ico:$('pIco').value,dic:$('pDic').value,address:$('pAddr').value,city:$('pCity').value,zip:$('pZip').value,email:$('pEmail').value,phone:$('pPhone').value,bankAccount:$('pBank').value,iban:$('pIban').value.replace(/\s/g,'')};localStorage.setItem('mgmt_profile',JSON.stringify(data));toast('Nastavení uloženo','success');}

// ═══ ACTIONS ═════════════════════════════════════════════════
async function setStage(id,s){var o=go(id);if(o){await mut('update','orders',{id:id,data:Object.assign({},o,{stage:s})});toast('Stav aktualizován','success');}}
async function archO(id){confirmAction('Archivovat tuto zakázku?','Archivovat',async function(){var o=go(id);if(o){await mut('update','orders',{id:id,data:Object.assign({},o,{status:'archived'})});toast('Zakázka archivována','success');sv('orders');}});}
async function restO(id){var o=go(id);if(o){await mut('update','orders',{id:id,data:Object.assign({},o,{status:'active'})});toast('Zakázka obnovena','success');}}
async function delO(id){confirmAction('Opravdu smazat tuto zakázku? Tato akce je nevratná.','Smazat',async function(){await mut('delete','orders',{id:id});toast('Zakázka smazána','success');sv('orders');});}
async function delC(id){confirmAction('Smazat klienta?','Smazat',async function(){await mut('delete','clients',{id:id});toast('Klient smazán','success');sv('clients');});}
async function delE(id,oid){confirmAction('Smazat tento záznam?','Smazat',async function(){await mut('delete','entries',{id:id});toast('Záznam smazán','success');if(oid)vOrderDetail(oid);});}
async function delI(id){confirmAction('Smazat tuto fakturu?','Smazat',async function(){await mut('delete','invoices',{id:id});toast('Faktura smazána','success');});}
async function delExp(id,oid){confirmAction('Smazat tento náklad?','Smazat',async function(){await mut('delete','expenses',{id:id});toast('Náklad smazán','success');if(oid)vOrderDetail(oid);});}
async function delNote(id,oid){confirmAction('Smazat tuto poznámku?','Smazat',async function(){await mut('delete','notes',{id:id});toast('Poznámka smazána','success');if(oid)vOrderDetail(oid);});}
async function setIS(id,status){
  var i=DB.invoices.find(function(x){return x.id===id;});if(!i)return;
  if(status==='paid'){
    openModal('<div style="font-size:18px;font-weight:800;margin-bottom:20px">Datum zaplacení</div><div class="fr"><label class="lbl">Kdy byla faktura zaplacena?</label><input class="inp" type="date" id="fpaid" value="'+today()+'"></div><div class="mfooter"><button class="btn bg" onclick="closeModal()">Zrušit</button><button class="btn bp" onclick="confirmPay('+id+')">✓ Potvrdit platbu</button></div>');
  }else{await mut('update','invoices',{id:id,data:Object.assign({},i,{status:status})});toast('Stav aktualizován','success');}
}
async function confirmPay(id){
  var i=DB.invoices.find(function(x){return x.id===id;});if(!i)return;
  var paidDate=$('fpaid').value||today();
  closeModal();await mut('update','invoices',{id:id,data:Object.assign({},i,{status:'paid',paidDate:paidDate})});toast('Faktura označena jako zaplacená','success');
}

// ═══ MODALS ══════════════════════════════════════════════════
function cpick(sel,varN){return '<div class="cp">'+COLORS.map(function(c){return '<div class="cs'+(c===sel?' sel':'')+'" style="background:'+c+'" onclick="'+varN+'=\''+c+'\';document.querySelectorAll(\'.cs\').forEach(function(x){x.classList.remove(\'sel\');});this.classList.add(\'sel\')"></div>';}).join('')+'</div>';}
function openModal(h){$('mbox').innerHTML=h;$('modal-ov').classList.add('open');}
function closeModal(){$('modal-ov').classList.remove('open');}

function openOM(id){
  var o=id?go(id):null;FC=o?.color||'#f59e0b';
  var co=DB.clients.map(function(c){return '<option value="'+c.id+'"'+(Number(o?.clientId)===c.id?' selected':'')+'>'+e(c.company||c.name)+'</option>';}).join('');
  var so=STAGES.map(function(s){return '<option'+(s===(o?.stage||'Poptávka')?' selected':'')+'>'+s+'</option>';}).join('');
  openModal('<div style="font-size:18px;font-weight:800;margin-bottom:20px">'+(o?'Upravit zakázku':'Nová zakázka')+'</div><div class="fr"><label class="lbl">Název *</label><input class="inp" id="fn" value="'+e(o?.name||'')+'" placeholder="Název zakázky"></div><div class="fr"><label class="lbl">Klient</label><select class="inp" id="fcl" onchange="autoColor()"><option value="">— bez klienta —</option>'+co+'</select></div><div class="fr"><label class="lbl">Popis</label><textarea class="inp" id="fd" rows="3" style="resize:vertical">'+e(o?.description||'')+'</textarea></div><div style="display:grid;grid-template-columns:1fr 90px;gap:10px;margin-bottom:13px"><div class="fr" style="margin:0"><label class="lbl">Cena</label><input class="inp" type="number" id="fp" value="'+(o?.price||'')+'"></div><div class="fr" style="margin:0"><label class="lbl">Měna</label><select class="inp" id="fcu"><option'+((o?.currency||'CZK')==='CZK'?' selected':'')+'>CZK</option><option'+(o?.currency==='EUR'?' selected':'')+'>EUR</option><option'+(o?.currency==='USD'?' selected':'')+'>USD</option></select></div></div><div class="fr"><label class="lbl">Deadline</label><input class="inp" type="date" id="fdl" value="'+(o?.deadline||'')+'"></div><div class="fr"><label class="lbl">Stav</label><select class="inp" id="fst">'+so+'</select></div><div class="fr"><label class="lbl">Barva</label>'+cpick(FC,'FC')+'</div><div class="mfooter"><button class="btn bg" onclick="closeModal()">Zrušit</button><button class="btn bp" onclick="saveO('+(o?.id||0)+')">Uložit</button></div>');
}
async function saveO(id){var name=$('fn').value.trim();if(!name)return toast('Zadej název','error');var data={name:name,clientId:Number($('fcl').value)||'',description:$('fd').value,price:Number($('fp').value)||0,currency:$('fcu').value,deadline:$('fdl').value,stage:$('fst').value,color:FC};closeModal();if(id)await mut('update','orders',{id:id,data:Object.assign({},go(id),data)});else await mut('create','orders',{data:Object.assign({},data,{status:'active',created:today()})});toast(id?'Zakázka aktualizována':'Zakázka vytvořena','success');}

function openCM(id){
  var c=id?gc(id):null;FC=c?.color||'#3b82f6';
  openModal('<div style="font-size:18px;font-weight:800;margin-bottom:20px">'+(c?'Upravit klienta':'Nový klient')+'</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px"><div class="fr" style="margin:0"><label class="lbl">Jméno *</label><input class="inp" id="fn" value="'+e(c?.name||'')+'"></div><div class="fr" style="margin:0"><label class="lbl">Firma</label><input class="inp" id="fco" value="'+e(c?.company||'')+'"></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px"><div class="fr" style="margin:0"><label class="lbl">Email</label><input class="inp" type="email" id="fem" value="'+e(c?.email||'')+'"></div><div class="fr" style="margin:0"><label class="lbl">Telefon</label><input class="inp" type="tel" id="fph" value="'+e(c?.phone||'')+'"></div></div><div class="fr"><label class="lbl">Adresa</label><input class="inp" id="fad" value="'+e(c?.address||'')+'"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px"><div class="fr" style="margin:0"><label class="lbl">Město</label><input class="inp" id="fci" value="'+e(c?.city||'')+'"></div><div class="fr" style="margin:0"><label class="lbl">PSČ</label><input class="inp" id="fzi" value="'+e(c?.zip||'')+'"></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px"><div class="fr" style="margin:0"><label class="lbl">IČO</label><input class="inp" id="fico" value="'+e(c?.ico||'')+'"></div><div class="fr" style="margin:0"><label class="lbl">DIČ</label><input class="inp" id="fdic" value="'+e(c?.dic||'')+'"></div></div><div class="fr"><label class="lbl">Poznámky</label><textarea class="inp" id="fno" rows="2" style="resize:vertical">'+e(c?.notes||'')+'</textarea></div><div class="fr"><label class="lbl">Barva</label>'+cpick(FC,'FC')+'</div><div class="mfooter"><button class="btn bg" onclick="closeModal()">Zrušit</button><button class="btn bp" onclick="saveC('+(c?.id||0)+')">Uložit</button></div>');
}
async function saveC(id){var name=$('fn').value.trim();if(!name)return toast('Zadej jméno','error');var data={name:name,company:$('fco').value,email:$('fem').value,phone:$('fph').value,address:$('fad').value,city:$('fci').value,zip:$('fzi').value,ico:$('fico').value,dic:$('fdic').value,notes:$('fno').value,color:FC};closeModal();if(id)await mut('update','clients',{id:id,data:Object.assign({},gc(id),data)});else await mut('create','clients',{data:data});toast(id?'Klient aktualizován':'Klient vytvořen','success');}

function openEM(oid){
  var ao=DB.orders.filter(function(o){return o.status==='active';});
  var opts=ao.map(function(o){return '<option value="'+o.id+'"'+(o.id===oid?' selected':'')+'>'+e(o.name)+'</option>';}).join('');
  openModal('<div style="font-size:18px;font-weight:800;margin-bottom:20px">Ruční záznam</div><div class="fr"><label class="lbl">Zakázka</label><select class="inp" id="fao">'+opts+'</select></div><div class="fr"><label class="lbl">Popis</label><input class="inp" id="fed" placeholder="Co jste dělali..."></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px"><div class="fr" style="margin:0"><label class="lbl">Hodiny</label><input class="inp" type="number" min="0" id="fh" placeholder="0"></div><div class="fr" style="margin:0"><label class="lbl">Minuty</label><input class="inp" type="number" min="0" max="59" id="fm" placeholder="0"></div></div><div class="fr"><label class="lbl">Datum</label><input class="inp" type="date" id="fdt" value="'+today()+'"></div><div class="mfooter"><button class="btn bg" onclick="closeModal()">Zrušit</button><button class="btn bp" onclick="saveE('+(oid||0)+')">Uložit</button></div>');
}
async function saveE(returnOid){var dur=(Number($('fh').value)||0)*3600+(Number($('fm').value)||0)*60;if(!dur)return toast('Zadej dobu práce','error');var data={orderId:Number($('fao').value),description:$('fed').value||'Práce',duration:dur,date:$('fdt').value};closeModal();await mut('create','entries',{data:data});toast('Záznam uložen','success');if(returnOid)vOrderDetail(returnOid);}

function openExpM(oid){
  var cats=EXP_CATS.map(function(c){return '<option>'+c+'</option>';}).join('');
  openModal('<div style="font-size:18px;font-weight:800;margin-bottom:20px">Nový náklad</div><div class="fr"><label class="lbl">Popis *</label><input class="inp" id="exd" placeholder="Popis nákladu..."></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px"><div class="fr" style="margin:0"><label class="lbl">Částka (Kč) *</label><input class="inp" type="number" id="exa" placeholder="0"></div><div class="fr" style="margin:0"><label class="lbl">Kategorie</label><select class="inp" id="exc">'+cats+'</select></div></div><div class="fr"><label class="lbl">Datum</label><input class="inp" type="date" id="exdt" value="'+today()+'"></div><div class="mfooter"><button class="btn bg" onclick="closeModal()">Zrušit</button><button class="btn bp" onclick="saveExp('+oid+')">Uložit</button></div>');
}
async function saveExp(oid){var desc=$('exd').value.trim();var amt=Number($('exa').value);if(!desc||!amt)return toast('Vyplň popis a částku','error');var data={orderId:oid,description:desc,amount:amt,category:$('exc').value,date:$('exdt').value};closeModal();await mut('create','expenses',{data:data});toast('Náklad přidán','success');vOrderDetail(oid);}

function openNoteM(oid){
  openModal('<div style="font-size:18px;font-weight:800;margin-bottom:20px">Nová poznámka</div><div class="fr"><label class="lbl">Text poznámky</label><textarea class="inp" id="ntxt" rows="4" style="resize:vertical" placeholder="Vaše poznámka..."></textarea></div><div class="mfooter"><button class="btn bg" onclick="closeModal()">Zrušit</button><button class="btn bp" onclick="saveNote('+oid+')">Uložit</button></div>');
}
async function saveNote(oid){var txt=$('ntxt').value.trim();if(!txt)return toast('Zadej text poznámky','error');var data={orderId:oid,text:txt,created:today()};closeModal();await mut('create','notes',{data:data});toast('Poznámka přidána','success');vOrderDetail(oid);}

function openIM(){
  var orders=DB.orders;var opts=orders.map(function(o){return '<option value="'+o.id+'">'+e(o.name)+'</option>';}).join('');INV_ITEMS=[];
  openModal('<div style="font-size:18px;font-weight:800;margin-bottom:20px">Nová faktura</div><div class="fr"><label class="lbl">Zakázka</label><select class="inp" id="fao" onchange="prefillI()">'+opts+'</select></div><div id="iinfo" style="background:#13151f;border-radius:9px;padding:11px;font-size:12px;color:#64748b;margin-bottom:13px"></div><div class="fr"><label class="lbl">Příjemce</label><input class="inp" id="frec"></div><div id="iitems"></div><button class="btn bg btn-sm" style="margin-bottom:13px" onclick="addII()">+ Přidat položku</button><div id="itot" class="mono" style="text-align:right;font-size:15px;font-weight:800;color:#f59e0b;margin-bottom:13px">Celkem: 0 Kč</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px"><div class="fr" style="margin:0"><label class="lbl">Splatnost</label><input class="inp" type="date" id="fdu" value="'+dueIn(14)+'"></div><div class="fr" style="margin:0"><label class="lbl">Měna</label><select class="inp" id="fcu"><option>CZK</option><option>EUR</option><option>USD</option></select></div></div><div class="fr"><label class="lbl">Poznámka</label><textarea class="inp" id="fno" rows="2" style="resize:vertical"></textarea></div><div class="mfooter"><button class="btn bg" onclick="closeModal()">Zrušit</button><button class="btn bp" onclick="saveI()">Vytvořit fakturu</button></div>');
  prefillI();addII();
}
function prefillI(){var o=go(Number($('fao')?.value));var cl=o?gc(o.clientId):null;if(cl&&$('frec'))$('frec').value=cl.company||cl.name;if(o&&$('iinfo'))$('iinfo').innerHTML='Odpracováno: <span style="color:#8b5cf6">'+fmtDur(ts(o.id))+'</span> · Hodnota: <span style="color:#f59e0b">'+fmtM(o.price)+'</span> · Náklady: <span style="color:#ef4444">'+fmtM(expSum(o.id))+'</span>';}
function addII(){INV_ITEMS.push({desc:'',qty:1,price:''});renderII();}
function remII(i){INV_ITEMS.splice(i,1);renderII();}
function updII(i,k,v){INV_ITEMS[i][k]=v;calcItot();}
function renderII(){var el=$('iitems');if(!el)return;el.innerHTML=INV_ITEMS.map(function(it,i){return '<div style="display:grid;grid-template-columns:1fr 60px 100px 32px;gap:6px;margin-bottom:6px"><input class="inp" placeholder="Popis" value="'+e(it.desc)+'" oninput="updII('+i+',\'desc\',this.value)"><input class="inp" type="number" placeholder="Ks" value="'+it.qty+'" oninput="updII('+i+',\'qty\',this.value)" style="text-align:center"><input class="inp" type="number" placeholder="Cena" value="'+it.price+'" oninput="updII('+i+',\'price\',this.value)"><button class="btn bd btn-sm" style="padding:0 8px" onclick="remII('+i+')">✕</button></div>';}).join('');}
function calcItot(){var tot=INV_ITEMS.reduce(function(s,it){return s+(Number(it.qty)||0)*(Number(it.price)||0);},0);var el=$('itot');if(el)el.textContent='Celkem: '+fmtM(tot);}
async function saveI(){var items=INV_ITEMS.map(function(it){return{desc:it.desc,qty:Number(it.qty)||1,price:Number(it.price)||0};});var amount=items.reduce(function(s,it){return s+it.qty*it.price;},0);if(!amount)return toast('Přidej alespoň jednu položku s cenou','error');var oid=Number($('fao').value);var o=go(oid);var data={orderId:oid,clientId:o?.clientId||'',recipient:$('frec').value,items:items,amount:amount,currency:$('fcu').value,dueDate:$('fdu').value,note:$('fno').value,status:'draft',issued:today(),number:nin()};INV_ITEMS=[];closeModal();await mut('create','invoices',{data:data});toast('Faktura vytvořena','success');}

function expClients(){exportCSV(DB.clients,[{label:'Jméno',key:'name'},{label:'Firma',key:'company'},{label:'Email',key:'email'},{label:'Telefon',key:'phone'},{label:'IČO',key:'ico'},{label:'DIČ',key:'dic'},{label:'Město',key:'city'}],'klienti.csv');}
function expArchive(){exportCSV(DB.orders.filter(function(o){return o.status==='archived';}),[{label:'Název',key:'name'},{label:'Stav',key:'stage'},{label:'Cena',key:'price'},{label:'Deadline',key:'deadline'}],'archiv.csv');}
function expTime(){exportCSV(DB.entries,[{label:'Datum',key:'date'},{label:'Zakázka',fn:function(x){var o=go(x.orderId);return o?o.name:'';}},{label:'Popis',key:'description'},{label:'Délka (min)',fn:function(x){return Math.round((x.duration||0)/60);}}],'cas.csv');}
function expInvoices(){exportCSV(DB.invoices,[{label:'Číslo',key:'number'},{label:'Příjemce',key:'recipient'},{label:'Částka',key:'amount'},{label:'Měna',key:'currency'},{label:'Vystaveno',key:'issued'},{label:'Splatnost',key:'dueDate'},{label:'Stav',key:'status'}],'faktury.csv');}

</script>

<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit','Segoe UI',sans-serif;background:#09090f;color:#e2e8f0;min-height:100vh;display:flex}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#1e2433;border-radius:2px}
input,textarea,select{outline:none;font-family:inherit}
button{cursor:pointer;font-family:inherit}
#sidebar{width:200px;background:#09090f;border-right:1px solid #1a1f2e;padding:20px 12px;display:flex;flex-direction:column;gap:3px;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#content{flex:1;overflow:auto;padding:28px 32px}
.nav-logo{padding:2px 8px 18px;border-bottom:1px solid #1a1f2e;margin-bottom:8px}
.nav-logo .t{font-size:16px;font-weight:800;color:#f59e0b;letter-spacing:-.03em}
.nav-logo .s{font-size:10px;color:#334155;margin-top:1px}
.ni{display:flex;align-items:center;gap:10px;padding:9px 13px;border-radius:9px;color:#64748b;font-size:13px;font-weight:500;border:none;background:none;width:100%;text-align:left;cursor:pointer;transition:all .15s}
.ni:hover{background:#13151f;color:#cbd5e1}
.ni.act{background:#13151f;color:#f59e0b}
.nb{background:#1a1f2e;color:#475569;font-size:10px;font-weight:700;padding:1px 6px;border-radius:6px;margin-left:auto}
.nav-bot{padding:12px 8px;border-top:1px solid #1a1f2e;margin-top:auto;font-size:11px;color:#334155}
.btn{padding:8px 16px;border-radius:9px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.bp{background:#f59e0b;color:#09090f}.bp:hover{background:#d97706}
.bg{background:#13151f;color:#94a3b8;border:1px solid #1a1f2e}.bg:hover{background:#1a1f2e;color:#e2e8f0}
.bd{background:#2d0a0a;color:#f87171;border:1px solid #3f1515}.bd:hover{background:#3f1515}
.bs{background:#062016;color:#34d399;border:1px solid #0d3a25}.bs:hover{background:#0d3a25}
.inp{background:#13151f;border:1px solid #1a1f2e;border-radius:9px;color:#e2e8f0;padding:9px 13px;font-size:13px;width:100%;transition:border .15s}
.inp:focus{border-color:#f59e0b66}
select.inp option{background:#13151f}
.card{background:#0f1118;border:1px solid #1a1f2e;border-radius:14px;padding:20px}
.sc{background:#0f1118;border:1px solid #1a1f2e;border-radius:13px;padding:18px 20px;cursor:pointer;transition:border-color .2s}
.sc:hover{border-color:#f59e0b44}
.lbl{font-size:11px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;display:block}
.st{font-size:11px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;display:inline-block}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700}
.pb{height:3px;background:#1a1f2e;border-radius:2px;overflow:hidden;margin-top:6px}
.pf{height:100%;border-radius:2px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}
.mono{font-family:'JetBrains Mono',monospace}
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:9px 13px;font-size:11px;font-weight:700;color:#475569;text-transform:uppercase;border-bottom:1px solid #1a1f2e}
.tbl td{padding:11px 13px;border-bottom:1px solid #1a1f2e22;font-size:13px}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#13151f55}
#timer-bar{position:sticky;top:0;z-index:100;background:#09090fee;backdrop-filter:blur(10px);border-bottom:1px solid #1a1f2e;padding:10px 28px;display:none;align-items:center;gap:14px}
#modal-ov{display:none;position:fixed;inset:0;background:#00000099;backdrop-filter:blur(6px);z-index:200;align-items:center;justify-content:center}
#modal-ov.open{display:flex}
.mbox{background:#0f1118;border:1px solid #1a1f2e;border-radius:18px;padding:28px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto}
.mfooter{display:flex;gap:9px;justify-content:flex-end;margin-top:20px}
.fr{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.cp{display:flex;gap:7px;flex-wrap:wrap}
.cs{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.cs.sel{border-color:#fff}
#err-bar{display:none;background:#2d0a0a;border-bottom:1px solid #3f1515;padding:10px 28px;font-size:13px;color:#f87171;align-items:center;gap:10px}
#sync{display:none;position:fixed;bottom:20px;right:20px;background:#13151f;border:1px solid #f59e0b44;color:#f59e0b;padding:8px 16px;border-radius:9px;font-size:12px;font-weight:600;z-index:300}
#setup{display:none;align-items:center;justify-content:center;min-height:100vh;padding:24px;flex:1}
.sbox{background:#0f1118;border:1px solid #1a1f2e;border-radius:20px;padding:40px;max-width:460px;width:100%}
.stag{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:700;background:#13151f;color:#94a3b8}
.cbar{display:flex;align-items:flex-end;gap:6px;height:150px;padding-bottom:22px;position:relative}
.bcol{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end}
.binn{width:100%;background:#1a1f2e;border-radius:3px 3px 0 0;position:relative;min-height:2px}
.bfil{position:absolute;bottom:0;left:0;right:0;background:#f59e0b;border-radius:3px 3px 0 0}
.blab{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:10px;color:#475569;white-space:nowrap}
</style>
</head>
<body>

<div id="setup">
  <div class="sbox">
    <div style="font-size:28px;margin-bottom:8px">📋</div>
    <h1 style="font-size:22px;font-weight:800;margin-bottom:6px">Management System</h1>
    <p style="color:#64748b;font-size:14px;margin-bottom:24px;line-height:1.6">Vlož URL svého Google Apps Script.</p>
    <label class="lbl">Apps Script URL</label>
    <input class="inp" id="setup-url" placeholder="https://script.google.com/macros/s/..." style="margin-bottom:16px"/>
    <button class="btn bp" style="width:100%;justify-content:center" onclick="saveUrl()">Připojit →</button>
    <div style="margin-top:20px;padding:14px;background:#13151f;border-radius:10px;font-size:12px;color:#64748b;line-height:1.7">
      V Google Sheets: <strong style="color:#94a3b8">Rozšíření → Apps Script → Nasadit → Nová nasazení</strong><br>
      Typ: Webová aplikace, Přístup: Kdokoli
    </div>
  </div>
</div>

<div id="app" style="display:none;flex:1">
  <div id="sidebar">
    <div class="nav-logo"><div class="t">Management</div><div class="s">System</div></div>
    <button class="ni act" data-v="dashboard" onclick="nav(this)"><span>⊞</span><span>Přehled</span></button>
    <button class="ni" data-v="clients" onclick="nav(this)"><span>◉</span><span>Klienti</span><span class="nb" id="bc">0</span></button>
    <button class="ni" data-v="orders" onclick="nav(this)"><span>◈</span><span>Zakázky</span><span class="nb" id="bo">0</span></button>
    <button class="ni" data-v="archive" onclick="nav(this)"><span>⊡</span><span>Archiv</span><span class="nb" id="ba">0</span></button>
    <button class="ni" data-v="time" onclick="nav(this)"><span>◷</span><span>Čas</span></button>
    <button class="ni" data-v="invoices" onclick="nav(this)"><span>◻</span><span>Faktury</span><span class="nb" id="bi">0</span></button>
    <button class="ni" data-v="reports" onclick="nav(this)"><span>◑</span><span>Reporty</span></button>
    <div class="nav-bot">
      <div>Celkový obrat</div>
      <div class="mono" id="nav-rev" style="color:#f59e0b;font-weight:800;font-size:14px">0 Kč</div>
      <button class="btn bg" style="font-size:10px;padding:3px 8px;margin-top:8px;width:100%" onclick="resetUrl()">⚙ Změnit URL</button>
    </div>
  </div>
  <div id="main">
    <div id="err-bar"><span id="err-msg"></span><button class="btn bg" style="font-size:11px;padding:3px 10px;margin-left:auto" onclick="loadAll()">Zkusit znovu</button></div>
    <div id="timer-bar">
      <span class="dot" id="td" style="width:11px;height:11px"></span>
      <div style="flex:1">
        <div style="font-size:11px;color:#64748b" id="ton"></div>
        <input class="inp" id="tdesc" placeholder="Popis práce..." style="padding:2px 8px;font-size:12px;width:200px;margin-top:2px;background:#13151f">
      </div>
      <div class="mono" id="tdisp" style="font-size:26px;font-weight:600;color:#f59e0b">00:00:00</div>
      <button class="btn bd" onclick="stopTimer()">⏹ Uložit</button>
    </div>
    <div id="content"></div>
  </div>
</div>

<div id="modal-ov" onclick="if(event.target===this)closeModal()">
  <div class="mbox" id="mbox"></div>
</div>
<div id="sync">⟳ Ukládám…</div>

<script>
const DB={clients:[],orders:[],entries:[],invoices:[]};
let curView='dashboard';
let TS={running:false,orderId:null,elapsed:0,iv:null};
let FC='#f59e0b';
let INV_ITEMS=[];
const COLORS=['#f59e0b','#3b82f6','#10b981','#ef4444','#8b5cf6','#ec4899','#06b6d4','#f97316'];
const STAGES=['Poptávka','Nabídka','V řešení','Fakturováno','Zaplaceno'];

const $=id=>document.getElementById(id);
const fmtM=(n,c)=>new Intl.NumberFormat('cs-CZ',{style:'currency',currency:c||'CZK',minimumFractionDigits:0}).format(n||0);
const fmtD=d=>d?new Date(d).toLocaleDateString('cs-CZ'):'—';
const fmtDur=s=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h===0?`${m} min`:m===0?`${h} hod`:`${h}h ${m}m`;};
const fmtT=s=>`${String(Math.floor(s/3600)).padStart(2,'0')}:${String(Math.floor((s%3600)/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
const today=()=>new Date().toISOString().slice(0,10);
const e=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const ts=oid=>DB.entries.filter(x=>x.orderId===oid).reduce((s,x)=>s+(x.duration||0),0);
const gc=id=>DB.clients.find(c=>c.id===Number(id));
const go=id=>DB.orders.find(o=>o.id===Number(id));
const nin=()=>`FV-${new Date().getFullYear()}-${String(DB.invoices.length+1).padStart(3,'0')}`;

// Setup
function getUrl(){return localStorage.getItem('mgmt_url')||'';}
function saveUrl(){const u=$('setup-url').value.trim();if(!u)return;localStorage.setItem('mgmt_url',u);boot();}
function resetUrl(){localStorage.removeItem('mgmt_url');location.reload();}

window.onload=()=>{
  if(!getUrl()){$('setup').style.display='flex';}
  else boot();
};

function boot(){
  $('setup').style.display='none';
  $('app').style.display='flex';
  loadAll();
}

// API
async function apiFetch(p){
  const r=await fetch(`${getUrl()}?${new URLSearchParams(p)}`);
  const j=await r.json();
  if(j.error)throw new Error(j.error);
  return j;
}
async function apiPost(b){
  const r=await fetch(getUrl(),{method:'POST',body:JSON.stringify(b)});
  const j=await r.json();
  if(j.error)throw new Error(j.error);
  return j;
}

async function loadAll(){
  html('<div style="text-align:center;padding:80px;color:#475569">⟳ Načítám data…</div>');
  try{
    const d=await apiFetch({action:'getAll'});
    DB.clients=d.clients||[];DB.orders=d.orders||[];DB.entries=d.entries||[];DB.invoices=d.invoices||[];
    hideErr();badges();render();
  }catch(err){showErr(err.message);html('<div style="text-align:center;padding:80px;color:#475569">Chyba načítání.<br><small>'+e(err.message)+'</small></div>');}
}

async function mut(action,sheet,payload){
  $('sync').style.display='block';
  try{
    const res=await apiPost({action,sheet,...payload});
    const d=res.data;
    if(action==='create')DB[sheet].push(d);
    if(action==='update'){const i=DB[sheet].findIndex(r=>r.id===d.id);if(i>-1)DB[sheet][i]=d;}
    if(action==='delete')DB[sheet]=DB[sheet].filter(r=>r.id!==d.id);
    badges();render();
  }catch(err){showErr(err.message);}
  finally{$('sync').style.display='none';}
}

// Nav
function nav(el){
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('act'));
  el.classList.add('act');
  curView=el.dataset.v;render();
}
function sv(v){
  document.querySelectorAll('.ni').forEach(n=>n.classList.toggle('act',n.dataset.v===v));
  curView=v;render();
}

function render(){
  const map={dashboard:vDash,clients:vClients,orders:vOrders,archive:vArchive,time:vTime,invoices:vInvoices,reports:vReports};
  if(map[curView])map[curView]();
  $('nav-rev').textContent=fmtM(DB.orders.reduce((s,o)=>s+(o.price||0),0));
}
function html(h){$('content').innerHTML=h;}
function badges(){
  $('bc').textContent=DB.clients.length;
  $('bo').textContent=DB.orders.filter(o=>o.status==='active').length;
  $('ba').textContent=DB.orders.filter(o=>o.status==='archived').length;
  $('bi').textContent=DB.invoices.length;
}
function showErr(m){const b=$('err-bar');b.style.display='flex';$('err-msg').textContent=m;}
function hideErr(){$('err-bar').style.display='none';}

// Timer
function startTimer(oid){
  if(TS.running)return;
  const o=go(oid);
  TS={running:true,orderId:oid,elapsed:0};
  TS.iv=setInterval(()=>{TS.elapsed++;$('tdisp').textContent=fmtT(TS.elapsed);},1000);
  const b=$('timer-bar');b.style.display='flex';
  $('td').style.background=o?.color||'#f59e0b';
  $('td').style.boxShadow=`0 0 10px ${o?.color||'#f59e0b'}88`;
  $('ton').textContent=o?.name||'';
  render();
}
async function stopTimer(){
  clearInterval(TS.iv);
  const {orderId,elapsed}=TS;
  TS={running:false,orderId:null,elapsed:0,iv:null};
  $('timer-bar').style.display='none';
  if(elapsed>0){
    const desc=$('tdesc').value||'Práce';
    $('tdesc').value='';
    await mut('create','entries',{data:{orderId,description:desc,duration:elapsed,date:today()}});
  }else render();
}

// PDF
function printInv(id){
  const inv=DB.invoices.find(i=>i.id===id);
  const cl=gc(inv?.clientId);
  const items=Array.isArray(inv.items)?inv.items:[];
  const rows=items.map(it=>`<tr><td>${e(it.desc)}</td><td style="text-align:center">${it.qty}</td><td style="text-align:right">${fmtM(it.price)}</td><td style="text-align:right">${fmtM(it.qty*it.price)}</td></tr>`).join('');
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${e(inv.number)}</title>
  <style>body{font-family:'Segoe UI',sans-serif;color:#111;padding:36px;font-size:14px}
  .h{display:flex;justify-content:space-between;margin-bottom:32px}.logo{font-size:22px;font-weight:800}
  .p2{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:28px}
  .pt h3{font-size:10px;text-transform:uppercase;color:#999;margin:0 0 6px}.pt p{margin:2px 0;font-size:13px}.nm{font-weight:700;font-size:15px}
  .dt{display:flex;gap:24px;margin-bottom:24px;padding:12px;background:#f9fafb;border-radius:8px}
  .di span{display:block;font-size:10px;text-transform:uppercase;color:#999;margin-bottom:2px}
  table{width:100%;border-collapse:collapse;margin-bottom:16px}
  thead th{background:#111;color:#fff;padding:9px 12px;text-align:left;font-size:11px}
  td{padding:10px 12px;border-bottom:1px solid #f0f0f0;font-size:13px}
  .tot{display:flex;justify-content:flex-end}.tb{background:#111;color:#fff;padding:14px 20px;border-radius:8px;min-width:180px}
  .tb span{font-size:11px;opacity:.6;display:block;margin-bottom:3px}.tb strong{font-size:22px;font-weight:800}
  @media print{button{display:none!important}}</style></head><body>
  <div class="h"><div><div class="logo">${e(cl?.company||cl?.name||'—')}</div><div style="font-size:12px;color:#666">Faktura č. ${e(inv.number)}</div></div>
  <button onclick="window.print()" style="background:#111;color:#fff;border:none;padding:8px 18px;border-radius:7px;cursor:pointer">🖨 Tisknout / PDF</button></div>
  <div class="p2"><div class="pt"><h3>Dodavatel</h3><p class="nm">Vaše jméno / firma</p><p>Vaše adresa, město</p><p>IČO: 00000000</p></div>
  <div class="pt"><h3>Odběratel</h3><p class="nm">${e(cl?.company||cl?.name||inv.recipient||'—')}</p>
  ${cl?`<p>${e(cl.address||'')} ${e(cl.city||'')}</p><p>IČO: ${e(cl.ico||'—')}</p>${cl.dic?`<p>DIČ: ${e(cl.dic)}</p>`:''}`:''}
  </div></div>
  <div class="dt"><div class="di"><span>Datum vystavení</span><strong>${fmtD(inv.issued)}</strong></div><div class="di"><span>Datum splatnosti</span><strong>${fmtD(inv.dueDate)}</strong></div></div>
  <table><thead><tr><th>Popis</th><th>Ks</th><th style="text-align:right">Cena/ks</th><th style="text-align:right">Celkem</th></tr></thead><tbody>${rows}</tbody></table>
  <div class="tot"><div class="tb"><span>K úhradě</span><strong>${fmtM(inv.amount,inv.currency)}</strong></div></div>
  ${inv.note?`<div style="margin-top:20px;padding:12px;background:#fffbeb;border-left:3px solid #f59e0b;font-size:12px">${e(inv.note)}</div>`:''}
  </body></html>`);
  w.document.close();
}

// ─── Views ────────────────────────────────────────────────────────────────────
function vDash(){
  const act=DB.orders.filter(o=>o.status==='active');
  const paid=DB.invoices.filter(i=>i.status==='paid');
  const pend=DB.invoices.filter(i=>i.status!=='paid');
  const tt=DB.entries.reduce((s,x)=>s+(x.duration||0),0);
  const warn=pend.length?`<div style="display:flex;background:#1a0d00;border:1px solid #451a00;border-radius:12px;padding:14px 18px;margin-bottom:20px;align-items:center;gap:14px">
    <span style="font-size:18px">⚠️</span>
    <div><div style="font-weight:700;color:#fbbf24">${pend.length} nezaplacen${pend.length===1?'á faktura':'é faktury'}</div>
    <div style="font-size:12px;color:#92400e">${fmtM(pend.reduce((s,i)=>s+(i.amount||0),0))}</div></div>
    <button class="btn bg" style="font-size:12px;margin-left:auto" onclick="sv('invoices')">Zobrazit</button></div>`:'';
  const ar=act.slice(0,5).map(o=>{
    const cl=gc(o.clientId);
    const dl=Math.ceil((new Date(o.deadline)-new Date())/86400000);
    const pct=Math.min(100,Math.max(0,(new Date()-new Date(o.created))/(new Date(o.deadline)-new Date(o.created))*100))||0;
    return `<div style="display:flex;align-items:center;gap:11px;margin-bottom:13px">
      <span class="dot" style="background:${e(o.color)}"></span>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e(o.name)}</div>
        <div style="font-size:11px;color:#475569">${e(cl?.company||cl?.name||'—')} · <span style="color:${dl<14?'#f87171':'#64748b'}">${dl<0?'Po termínu!':dl+'d'}</span></div>
        <div class="pb"><div class="pf" style="width:${pct}%;background:${pct>85?'#ef4444':e(o.color)}"></div></div>
      </div>
      <span class="mono" style="font-size:11px;color:#f59e0b;flex-shrink:0">${fmtM(o.price)}</span>
    </div>`;}).join('');
  const ir=[...DB.invoices].reverse().slice(0,5).map(inv=>{
    const cl=gc(inv.clientId);
    const sc=inv.status==='paid'?{c:'#10b981',l:'Zaplaceno'}:inv.status==='sent'?{c:'#f59e0b',l:'Odesláno'}:{c:'#64748b',l:'Koncept'};
    return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <div style="background:#13151f;border-radius:7px;padding:3px 7px;font-size:10px;font-family:'JetBrains Mono',monospace;color:#64748b;flex-shrink:0">${e(inv.number)}</div>
      <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e(cl?.company||cl?.name||inv.recipient||'—')}</div>
      <div style="font-size:11px;color:#475569">Splatnost: ${fmtD(inv.dueDate)}</div></div>
      <div style="text-align:right;flex-shrink:0"><div class="mono" style="font-size:12px;font-weight:700">${fmtM(inv.amount)}</div>
      <div style="font-size:10px;color:${sc.c};font-weight:700">${sc.l}</div></div>
    </div>`;}).join('');

function vReports(){
  const tr=DB.invoices.filter(i=>i.status==='paid').reduce((s,i)=>s+(i.amount||0),0);
  const tt=DB.entries.reduce((s,x)=>s+(x.duration||0),0);
  const ar=tt>0?Math.round(tr/(tt/3600)):0;
  const mon=[];for(let i=5;i>=0;i--){
    const d=new Date();d.setMonth(d.getMonth()-i);
    const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const label=d.toLocaleDateString('cs-CZ',{month:'short'});
    const inv=DB.invoices.filter(x=>(x.issued||'').startsWith(k));
    mon.push({label,inv:inv.reduce((s,x)=>s+(x.amount||0),0),paid:inv.filter(x=>x.status==='paid').reduce((s,x)=>s+(x.amount||0),0)});
  }
  const maxV=Math.max(...mon.map(m=>m.inv),1);
  const bars=mon.map(m=>`<div class="bcol"><div class="binn" style="height:${Math.max((m.inv/maxV)*130,m.inv>0?4:0)}px"><div class="bfil" style="height:${m.inv>0?Math.round((m.paid/m.inv)*100):0}%"></div><span class="blab">${m.label}</span></div></div>`).join('');
  const rbc=DB.clients.map(c=>({name:c.company||c.name,v:DB.orders.filter(o=>Number(o.clientId)===c.id).reduce((s,o)=>s+(o.price||0),0),color:c.color||'#f59e0b'})).filter(x=>x.v>0).sort((a,b)=>b.v-a.v);
  const maxC=Math.max(...rbc.map(c=>c.v),1);
  const cbars=rbc.slice(0,6).map(c=>`<div style="margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
      <div style="display:flex;align-items:center;gap:7px"><span class="dot" style="background:${e(c.color)}"></span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px">${e(c.name)}</span></div>
      <span class="mono" style="color:#f59e0b;font-weight:700;flex-shrink:0">${fmtM(c.v)}</span>
    </div>
    <div class="pb" style="height:5px"><div class="pf" style="width:${(c.v/maxC)*100}%;background:${e(c.color)}"></div></div>
  </div>`).join('');
  const pipe=STAGES.map((s,i)=>{const st=DB.orders.filter(o=>o.stage===s);
    return `<div style="flex:1;min-width:110px;padding:0 10px${i<STAGES.length-1?';border-right:1px solid #1a1f2e':''}">
    <div style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">${s}</div>
    <div class="mono" style="font-size:22px;font-weight:800">${st.length}</div>
    <div class="mono" style="font-size:12px;color:#f59e0b;font-weight:600;margin-top:3px">${fmtM(st.reduce((s,o)=>s+(o.price||0),0))}</div>
    </div>`;}).join('');
  html(`<div style="margin-bottom:28px"><h1 style="font-size:28px;font-weight:800;letter-spacing:-.04em">Reporty</h1></div>
    <div class="g4" style="margin-bottom:22px">
      <div class="sc"><div class="mono" style="font-size:20px;font-weight:800;color:#f59e0b;margin-bottom:4px">${ar?fmtM(ar):'—'}</div><div style="font-size:12px;color:#64748b">Průměrná hod. sazba</div></div>
      <div class="sc"><div class="mono" style="font-size:20px;font-weight:800;color:#10b981;margin-bottom:4px">${fmtM(tr)}</div><div style="font-size:12px;color:#64748b">Celkové tržby</div></div>
      <div class="sc"><div class="mono" style="font-size:20px;font-weight:800;color:#ef4444;margin-bottom:4px">${fmtM(DB.invoices.filter(i=>i.status!=='paid').reduce((s,i)=>s+(i.amount||0),0))}</div><div style="font-size:12px;color:#64748b">Čekající platby</div></div>
      <div class="sc"><div class="mono" style="font-size:20px;font-weight:800;color:#8b5cf6;margin-bottom:4px">${fmtDur(tt)}</div><div style="font-size:12px;color:#64748b">Celkem hodin</div></div>
    </div>
    <div class="g2" style="margin-bottom:18px">
      <div class="card"><div class="st">Tržby — posledních 6 měsíců</div>
        <div class="cbar">${bars}</div>
        <div style="display:flex;gap:16px;font-size:11px;margin-top:6px">
          <span style="display:flex;align-items:center;gap:5px;color:#64748b"><span style="width:10px;height:10px;background:#1a1f2e;border-radius:2px;display:inline-block"></span> Fakturováno</span>
          <span style="display:flex;align-items:center;gap:5px;color:#64748b"><span style="width:10px;height:10px;background:#f59e0b;border-radius:2px;display:inline-block"></span> Zaplaceno</span>
        </div>
      </div>
      <div class="card"><div class="st">Tržby dle klienta</div>
        ${cbars||'<div style="color:#334155;font-size:13px;text-align:center;padding:30px 0">Žádná data</div>'}
      </div>
    </div>
    <div class="card"><div class="st">Pipeline zakázek</div><div style="display:flex;gap:0;overflow-x:auto">${pipe}</div></div>`);
}

// ─── Actions ──────────────────────────────────────────────────────────────────
async function setStage(id,s){const o=go(id);if(o)await mut('update','orders',{id,data:{...o,stage:s}});}
async function archO(id){const o=go(id);if(o)await mut('update','orders',{id,data:{...o,status:'archived'}});}
async function restO(id){const o=go(id);if(o)await mut('update','orders',{id,data:{...o,status:'active'}});}
async function delO(id){if(confirm('Smazat zakázku?'))await mut('delete','orders',{id});}
async function delC(id){if(confirm('Smazat klienta?')){await mut('delete','clients',{id});sv('clients');}}
async function delE(id){await mut('delete','entries',{id});}
async function setIS(id,status){const i=DB.invoices.find(x=>x.id===id);if(i)await mut('update','invoices',{id,data:{...i,status}});}

// ─── Modals ───────────────────────────────────────────────────────────────────
function cpick(sel,varN){return `<div class="cp">${COLORS.map(c=>`<div class="cs${c===sel?' sel':''}" style="background:${c}" onclick="${varN}='${c}';document.querySelectorAll('.cs').forEach(x=>x.classList.remove('sel'));this.classList.add('sel')"></div>`).join('')}</div>`;}
function openModal(h){$('mbox').innerHTML=h;$('modal-ov').classList.add('open');}
function closeModal(){$('modal-ov').classList.remove('open');}

function openOM(id){
  const o=id?go(id):null;FC=o?.color||'#f59e0b';
  const co=DB.clients.map(c=>`<option value="${c.id}"${Number(o?.clientId)===c.id?' selected':''}>${e(c.company||c.name)}</option>`).join('');
  const so=STAGES.map(s=>`<option${s===(o?.stage||'Poptávka')?' selected':''}>${s}</option>`).join('');
  openModal(`<div style="font-size:18px;font-weight:800;margin-bottom:20px">${o?'Upravit zakázku':'Nová zakázka'}</div>
    <div class="fr"><label class="lbl">Název *</label><input class="inp" id="fn" value="${e(o?.name||'')}" placeholder="Název zakázky"></div>
    <div class="fr"><label class="lbl">Klient</label><select class="inp" id="fcl"><option value="">— bez klienta —</option>${co}</select></div>
    <div class="fr"><label class="lbl">Popis</label><textarea class="inp" id="fd" rows="2" style="resize:vertical">${e(o?.description||'')}</textarea></div>
    <div style="display:grid;grid-template-columns:1fr 90px;gap:10px;margin-bottom:13px">
      <div class="fr" style="margin:0"><label class="lbl">Cena</label><input class="inp" type="number" id="fp" value="${o?.price||''}"></div>
      <div class="fr" style="margin:0"><label class="lbl">Měna</label><select class="inp" id="fcu"><option${(o?.currency||'CZK')==='CZK'?' selected':''}>CZK</option><option${o?.currency==='EUR'?' selected':''}>EUR</option><option${o?.currency==='USD'?' selected':''}>USD</option></select></div>
    </div>
    <div class="fr"><label class="lbl">Deadline</label><input class="inp" type="date" id="fdl" value="${o?.deadline||''}"></div>
    <div class="fr"><label class="lbl">Stav</label><select class="inp" id="fst">${so}</select></div>
    <div class="fr"><label class="lbl">Barva</label>${cpick(FC,'FC')}</div>
    <div class="mfooter"><button class="btn bg" onclick="closeModal()">Zrušit</button><button class="btn bp" onclick="saveO(${o?.id||0})">Uložit</button></div>`);
}

async function saveO(id){
  const name=$('fn').value.trim();if(!name)return alert('Zadej název');
  const data={name,clientId:Number($('fcl').value)||'',description:$('fd').value,price:Number($('fp').value)||0,currency:$('fcu').value,deadline:$('fdl').value,stage:$('fst').value,color:FC};
  closeModal();
  if(id)await mut('update','orders',{id,data:{...go(id),...data}});
  else await mut('create','orders',{data:{...data,status:'active',created:today()}});
}

function openCM(id){
  const c=id?gc(id):null;FC=c?.color||'#3b82f6';
  openModal(`<div style="font-size:18px;font-weight:800;margin-bottom:20px">${c?'Upravit klienta':'Nový klient'}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px">
      <div class="fr" style="margin:0"><label class="lbl">Jméno *</label><input class="inp" id="fn" value="${e(c?.name||'')}"></div>
      <div class="fr" style="margin:0"><label class="lbl">Firma</label><input class="inp" id="fco" value="${e(c?.company||'')}"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px">
      <div class="fr" style="margin:0"><label class="lbl">Email</label><input class="inp" type="email" id="fem" value="${e(c?.email||'')}"></div>
      <div class="fr" style="margin:0"><label class="lbl">Telefon</label><input class="inp" type="tel" id="fph" value="${e(c?.phone||'')}"></div>
    </div>
    <div class="fr"><label class="lbl">Adresa</label><input class="inp" id="fad" value="${e(c?.address||'')}"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px">
      <div class="fr" style="margin:0"><label class="lbl">Město</label><input class="inp" id="fci" value="${e(c?.city||'')}"></div>
      <div class="fr" style="margin:0"><label class="lbl">PSČ</label><input class="inp" id="fzi" value="${e(c?.zip||'')}"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px">
      <div class="fr" style="margin:0"><label class="lbl">IČO</label><input class="inp" id="fico" value="${e(c?.ico||'')}"></div>
      <div class="fr" style="margin:0"><label class="lbl">DIČ</label><input class="inp" id="fdic" value="${e(c?.dic||'')}"></div>
    </div>
    <div class="fr"><label class="lbl">Poznámky</label><textarea class="inp" id="fno" rows="2" style="resize:vertical">${e(c?.notes||'')}</textarea></div>
    <div class="fr"><label class="lbl">Barva</label>${cpick(FC,'FC')}</div>
    <div class="mfooter"><button class="btn bg" onclick="closeModal()">Zrušit</button><button class="btn bp" onclick="saveC(${c?.id||0})">Uložit</button></div>`);
}

async function saveC(id){
  const name=$('fn').value.trim();if(!name)return alert('Zadej jméno');
  const data={name,company:$('fco').value,email:$('fem').value,phone:$('fph').value,address:$('fad').value,city:$('fci').value,zip:$('fzi').value,ico:$('fico').value,dic:$('fdic').value,notes:$('fno').value,color:FC};
  closeModal();
  if(id)await mut('update','clients',{id,data:{...gc(id),...data}});
  else await mut('create','clients',{data});
}

function openEM(oid){
  const ao=DB.orders.filter(o=>o.status==='active');
  const opts=ao.map(o=>`<option value="${o.id}"${o.id===oid?' selected':''}>${e(o.name)}</option>`).join('');
  openModal(`<div style="font-size:18px;font-weight:800;margin-bottom:20px">Ruční záznam</div>
    <div class="fr"><label class="lbl">Zakázka</label><select class="inp" id="fao">${opts}</select></div>
    <div class="fr"><label class="lbl">Popis</label><input class="inp" id="fd" placeholder="Co jste dělali..."></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px">
      <div class="fr" style="margin:0"><label class="lbl">Hodiny</label><input class="inp" type="number" min="0" id="fh" placeholder="0"></div>
      <div class="fr" style="margin:0"><label class="lbl">Minuty</label><input class="inp" type="number" min="0" max="59" id="fm" placeholder="0"></div>
    </div>
    <div class="fr"><label class="lbl">Datum</label><input class="inp" type="date" id="fdt" value="${today()}"></div>
    <div class="mfooter"><button class="btn bg" onclick="closeModal()">Zrušit</button><button class="btn bp" onclick="saveE()">Uložit</button></div>`);
}

async function saveE(){
  const dur=(Number($('fh').value)||0)*3600+(Number($('fm').value)||0)*60;
  if(!dur)return alert('Zadej dobu práce');
  const data={orderId:Number($('fao').value),description:$('fd').value||'Práce',duration:dur,date:$('fdt').value};
  closeModal();await mut('create','entries',{data});
}

function openIM(){
  const orders=DB.orders;
  const opts=orders.map(o=>`<option value="${o.id}">${e(o.name)}</option>`).join('');
  INV_ITEMS=[];
  openModal(`<div style="font-size:18px;font-weight:800;margin-bottom:20px">Nová faktura</div>
    <div class="fr"><label class="lbl">Zakázka</label><select class="inp" id="fao" onchange="prefillI()">${opts}</select></div>
    <div id="iinfo" style="background:#13151f;border-radius:9px;padding:11px;font-size:12px;color:#64748b;margin-bottom:13px"></div>
    <div class="fr"><label class="lbl">Příjemce</label><input class="inp" id="frec"></div>
    <div id="iitems"></div>
    <button class="btn bg" style="font-size:12px;padding:5px 12px;margin-bottom:13px" onclick="addII()">+ Přidat položku</button>
    <div id="itot" class="mono" style="text-align:right;font-size:15px;font-weight:800;color:#f59e0b;margin-bottom:13px">Celkem: 0 Kč</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px">
      <div class="fr" style="margin:0"><label class="lbl">Splatnost</label><input class="inp" type="date" id="fdu"></div>
      <div class="fr" style="margin:0"><label class="lbl">Měna</label><select class="inp" id="fcu"><option>CZK</option><option>EUR</option><option>USD</option></select></div>
    </div>
    <div class="fr"><label class="lbl">Poznámka</label><textarea class="inp" id="fno" rows="2" style="resize:vertical"></textarea></div>
    <div class="mfooter"><button class="btn bg" onclick="closeModal()">Zrušit</button><button class="btn bp" onclick="saveI()">Vytvořit fakturu</button></div>`);
  prefillI();addII();
}

function prefillI(){
  const o=go(Number($('fao')?.value));
  const cl=o?gc(o.clientId):null;
  if(cl&&$('frec'))$('frec').value=cl.company||cl.name;
  if(o&&$('iinfo'))$('iinfo').innerHTML=`Odpracováno: <span style="color:#8b5cf6">${fmtDur(ts(o.id))}</span> · Hodnota: <span style="color:#f59e0b">${fmtM(o.price)}</span>`;
}

function addII(){INV_ITEMS.push({desc:'',qty:1,price:''});renderII();}
function remII(i){INV_ITEMS.splice(i,1);renderII();}
function updII(i,k,v){INV_ITEMS[i][k]=v;calcItot();}
function renderII(){
  const el=$('iitems');if(!el)return;
  el.innerHTML=INV_ITEMS.map((it,i)=>`<div style="display:grid;grid-template-columns:1fr 60px 100px 28px;gap:6px;margin-bottom:6px">
    <input class="inp" placeholder="Popis" value="${e(it.desc)}" oninput="updII(${i},'desc',this.value)">
    <input class="inp" type="number" placeholder="Ks" value="${it.qty}" oninput="updII(${i},'qty',this.value)" style="text-align:center">
    <input class="inp" type="number" placeholder="Cena" value="${it.price}" oninput="updII(${i},'price',this.value)">
    <button class="btn bd" style="padding:0 8px" onclick="remII(${i})">✕</button>
  </div>`).join('');
}
function calcItot(){const tot=INV_ITEMS.reduce((s,it)=>s+(Number(it.qty)||0)*(Number(it.price)||0),0);const el=$('itot');if(el)el.textContent=`Celkem: ${fmtM(tot)}`;}

async function saveI(){
  const items=INV_ITEMS.map(it=>({desc:it.desc,qty:Number(it.qty)||1,price:Number(it.price)||0}));
  const amount=items.reduce((s,it)=>s+it.qty*it.price,0);
  if(!amount)return alert('Přidej alespoň jednu položku s cenou');
  const oid=Number($('fao').value);const o=go(oid);
  const data={orderId:oid,clientId:o?.clientId||'',recipient:$('frec').value,items,amount,currency:$('fcu').value,dueDate:$('fdu').value,note:$('fno').value,status:'draft',issued:today(),number:nin()};
  INV_ITEMS=[];closeModal();await mut('create','invoices',{data});
}
</script>
</body>
</html>
